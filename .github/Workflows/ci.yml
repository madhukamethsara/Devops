name : CI Pipeline
on:
  push:
    branches : ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name : checkout Code 
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/checkout@v4
        with:
          python-verstion: '3.9'
      
      - name: Install Dependencies
        run:
          pip install -r requirements.txt
      
      - name: Run Pytest
        run: pytest
